<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="280" height="270" viewBox="0 0 280 270"
     role="img" aria-labelledby="title desc">
  <title id="title">政大企家班 Logo</title>
  <desc id="desc">依低解析度截圖重建的可縮放向量版本</desc>

  <defs>
    <path id="topArc" d="M 59 86 A 101 101 0 0 1 221 86"/>
    <path id="bottomArc" d="M 37 153 A 106 106 0 0 0 243 153"/>
  </defs>

  <!-- 外環 -->
  <circle cx="140" cy="135" r="116"
          fill="#ffffff" stroke="#8a8a8a" stroke-width="1.4"
          stroke-dasharray="2.2 2.2"/>
  <g fill="#8a8a8a">
    <rect x="127" y="17" width="26" height="2.6" rx="1.3"/>
    <rect x="127" y="251" width="26" height="2.6" rx="1.3"/>
    <rect x="21" y="122" width="2.6" height="26" rx="1.3"/>
    <rect x="257" y="122" width="2.6" height="26" rx="1.3"/>
  </g>

  <!-- 環形文字 -->
  <g fill="#707070" text-rendering="geometricPrecision">
    <text font-family="PingFang TC, Noto Sans TC, Microsoft JhengHei, sans-serif"
          font-size="19" font-weight="700" letter-spacing="1.7">
      <textPath xlink:href="#topArc" startOffset="50%" text-anchor="middle">政大企家班</textPath>
    </text>
    <text font-family="Arial, Helvetica, sans-serif"
          font-size="8.1" font-weight="600" letter-spacing="0.05">
      <textPath xlink:href="#bottomArc" startOffset="50%" text-anchor="middle">Entrepreneurial &amp; Business Administration, National Chengchi University</textPath>
    </text>
  </g>

  <!-- 中央藍色圖形 -->
  <path fill="#0071b9" d="
    M 112 61
    L 76 96
    L 65 166
    C 62 184 76 198 96 198
    L 151 198
    L 190 159
    L 111 159
    C 100 159 94 153 96 142
    Z"/>

  <!-- 中央圓點 -->
  <circle cx="136" cy="135" r="22.5" fill="#0071b9"/>

  <!-- 中央橘色圖形 -->
  <path fill="#ffb11f" d="
    M 140 71
    L 178 71
    C 198 71 207 81 207 99
    L 200 135
    L 163 172
    L 175 116
    C 178 104 172 98 159 98
    L 112 98
    Z"/>

  <!-- 橘色右下延伸筆畫 -->
  <path fill="#ffb11f" d="
    M 177 148
    L 225 147
    L 180 190
    C 176 194 169 196 163 196
    L 148 196
    Z"/>

  <text x="140" y="219" text-anchor="middle"
        fill="#707070" font-family="Arial, Helvetica, sans-serif"
        font-size="8" font-weight="600">Since 1981</text>
</svg>
